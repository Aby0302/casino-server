<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Casino Lobby</title>
<style>
  :root {
    --bg: radial-gradient(ellipse at 50% 0%, #1f0d40, #0a0418 70%);
    --card: rgba(22, 10, 48, .85);
    --card-border: #3f2890;
    --card-hover: rgba(42, 22, 82, .95);
    --text: #efe8ff;
    --gold: #e7b53c;
    --pink: #e05298;
    --dim: #9a8fc0;
    --accent: #6f38d6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; min-height: 100vh; background: var(--bg); color: var(--text);
    font: 14px/1.5 system-ui, -apple-system, sans-serif; }
  body { display: flex; flex-direction: column; }

  /* ── header ── */
  header { display: flex; align-items: center; gap: 12px; padding: 12px 20px;
    border-bottom: 1px solid rgba(63, 40, 144, .5); flex-wrap: wrap; }
  header h1 { font-size: 18px; color: var(--gold); letter-spacing: 1px;
    background: linear-gradient(135deg, #e7b53c, #ff8cff); -webkit-background-clip: text;
    -webkit-text-fill-color: transparent; background-clip: text; }
  header .spacer { flex: 1; }
  .balance { background: rgba(20, 8, 44, .8); border: 1px solid var(--accent); border-radius: 8px;
    padding: 6px 14px; font-weight: 700; font-size: 14px; white-space: nowrap; }
  .balance span { color: var(--gold); }
  .player-id { color: var(--dim); font-size: 12px; }

  /* ── lobby grid ── */
  main { flex: 1; padding: 24px 20px 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
  .lobby-title { text-align: center; margin-bottom: 28px; }
  .lobby-title h2 { font-size: 22px; color: #fff; font-weight: 800; }
  .lobby-title p { color: var(--dim); font-size: 13px; margin-top: 4px; }

  .games { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px; }
  .game-card {
    background: var(--card); border: 1px solid var(--card-border); border-radius: 16px;
    overflow: hidden; cursor: pointer; transition: transform .2s, box-shadow .2s, border-color .2s;
    display: flex; flex-direction: column;
  }
  .game-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(111, 56, 214, .3);
    border-color: var(--accent); background: var(--card-hover); }
  .game-thumb {
    width: 100%; aspect-ratio: 16/9; background: linear-gradient(135deg, #1a0a30, #2d1060);
    display: flex; align-items: center; justify-content: center; font-size: 48px;
    position: relative; overflow: hidden;
  }
  .game-thumb .glow {
    position: absolute; width: 120%; height: 120%; top: -10%; left: -10%;
    background: radial-gradient(circle at 50% 50%, rgba(231, 181, 60, .08), transparent 70%);
  }
  .game-thumb .icon { position: relative; z-index: 1; filter: drop-shadow(0 0 12px rgba(231,181,60,.3)); }
  .game-info { padding: 16px; flex: 1; display: flex; flex-direction: column; }
  .game-info h3 { font-size: 16px; color: #fff; margin-bottom: 4px; }
  .game-info .desc { color: var(--dim); font-size: 12px; flex: 1; margin-bottom: 12px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .game-info .meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .game-info .meta .tag {
    background: rgba(111, 56, 214, .25); color: var(--dim); padding: 2px 8px;
    border-radius: 4px; font-size: 11px; border: 1px solid rgba(111, 56, 214, .3);
  }
  .play-btn {
    background: linear-gradient(135deg, var(--accent), #8a4aff); border: none; border-radius: 10px;
    color: #fff; font-weight: 800; padding: 10px; font-size: 14px; cursor: pointer;
    text-align: center; transition: opacity .15s; letter-spacing: .5px;
  }
  .play-btn:hover { opacity: .88; }
  .play-btn.sugar { background: linear-gradient(135deg, #ff3388, #ff6b3d); }

  /* ── game overlay ── */
  #game-layer {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: #000; flex-direction: column;
  }
  #game-layer.open { display: flex; }
  #game-bar {
    display: flex; align-items: center; gap: 12px; padding: 8px 14px;
    background: rgba(10, 4, 24, .95); border-bottom: 1px solid rgba(63, 40, 144, .5);
    z-index: 101; min-height: 48px;
  }
  #game-bar button {
    background: rgba(255,255,255,.08); border: none; color: #fff; padding: 6px 14px;
    border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px;
    transition: background .15s;
  }
  #game-bar button:hover { background: rgba(255,255,255,.16); }
  #game-bar .gtitle { flex: 1; font-weight: 700; font-size: 14px; color: var(--gold); }
  #game-bar .gbalance { color: var(--dim); font-size: 13px; }
  #game-frame {
    flex: 1; width: 100%; border: none;
  }

  /* ── loading ── */
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: var(--bg); z-index: 200; flex-direction: column; gap: 16px;
    transition: opacity .4s; }
  #loading.hide { opacity: 0; pointer-events: none; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(111,56,214,.2);
    border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--dim); font-size: 13px; }

  /* ── responsive ── */
  @media (max-width: 700px) {
    main { padding: 16px 12px 30px; }
    .games { grid-template-columns: 1fr; gap: 14px; }
    .lobby-title h2 { font-size: 18px; }
    header { padding: 10px 12px; }
    header h1 { font-size: 15px; }
    .game-thumb { aspect-ratio: 16/9; }
    #game-bar { padding: 6px 10px; min-height: 42px; }
    #game-bar button { padding: 5px 10px; font-size: 12px; }
  }
  @media (min-width: 701px) and (max-width: 1024px) {
    .games { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Casino yükleniyor...</p></div>

<header>
  <h1>CASINO</h1>
  <div class="spacer"></div>
  <div class="balance">Bakiye: <span id="hdrBalance">-</span></div>
  <div class="player-id" id="hdrPlayer">-</div>
</header>

<main>
  <div class="lobby-title">
    <h2>Oyunlar</h2>
    <p>Bir oyun seçin ve oynayın</p>
  </div>
  <div class="games" id="gameList"></div>
</main>

<div id="game-layer">
  <div id="game-bar">
    <button id="backBtn">&#8592; Lobi</button>
    <span class="gtitle" id="gameTitle">-</span>
    <span class="gbalance" id="gameBalance">-</span>
  </div>
  <iframe id="game-frame" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<script>
const GAMES = [
  {
    id: 'sugar-rush',
    name: 'Sugar Rush',
    icon: '🍬',
    desc: 'Tatli bir macerada sembolleri eslestirerek buyuk oduller kazanin. 7×7 grid, cascading wins ve carpan desteği.',
    tags: ['Slot', 'Cascade', '7×7'],
    color: 'sugar',
    launch: '/sugar-rush/',
  },
  {
    id: 'slot',
    name: 'Sweet Bonanza',
    icon: '🍑',
    desc: 'Klasik meyve sembolleriyle dolu 6×5 grid slot oyunu. Her spin\'de buyuk kazanclar icin cascade mekanigi.',
    tags: ['Slot', 'Cascade', '6×5'],
    color: '',
    launch: '/slot/',
  },
];

const COOKIE_NAME = 'casinoLobbySession';
let sessionID = null;
let ws = null;

function getOrCreateSessionID() {
  let sid = getCookie(COOKIE_NAME);
  if (!sid) {
    sid = 'player_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
    setCookie(COOKIE_NAME, sid, 365);
  }
  return sid;
}

function getCookie(name) {
  const m = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/([.$?*|{}()[\]\\^])/g, '\\$1') + '=([^;]*)'));
  return m ? decodeURIComponent(m[1]) : null;
}

function setCookie(name, val, days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  document.cookie = name + '=' + encodeURIComponent(val) + '; path=/; max-age=' + Math.floor(days * 86400);
}

async function fetchBalance() {
  try {
    const res = await fetch('/wallet/authenticate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionID }),
    });
    if (!res.ok) return null;
    const data = await res.json();
    const bal = Math.floor((data.balance?.amount || 0) / 1000000);
    document.getElementById('hdrBalance').textContent = bal.toLocaleString();
    document.getElementById('gameBalance').textContent = 'Bakiye: ' + bal.toLocaleString();
    return bal;
  } catch (e) {
    return null;
  }
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = proto + '//' + location.host + '/?sessionID=' + encodeURIComponent(sessionID);
  if (ws) try { ws.close(); } catch (e) {}
  ws = new WebSocket(url);
  ws.addEventListener('message', (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'connected' || msg.type === 'balance') {
        fetchBalance();
      }
    } catch (_) {}
  });
  ws.addEventListener('close', () => setTimeout(connectWS, 3000));
}

function renderGames() {
  const list = document.getElementById('gameList');
  list.innerHTML = GAMES.map(g => `
    <div class="game-card" data-game="${g.id}">
      <div class="game-thumb">
        <div class="glow"></div>
        <div class="icon">${g.icon}</div>
      </div>
      <div class="game-info">
        <h3>${g.name}</h3>
        <div class="desc">${g.desc}</div>
        <div class="meta">${g.tags.map(t => '<span class="tag">' + t + '</span>').join('')}</div>
        <div class="play-btn${g.color ? ' ' + g.color : ''}">Oyna</div>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.game-card').forEach(card => {
    card.addEventListener('click', () => {
      const g = GAMES.find(x => x.id === card.dataset.game);
      if (g) openGame(g);
    });
  });
}

function openGame(game) {
  const layer = document.getElementById('game-layer');
  const frame = document.getElementById('game-frame');
  const title = document.getElementById('gameTitle');

  title.textContent = game.name;

  let url = game.launch;
  if (game.id === 'sugar-rush') {
    url = '/client/start?source=web-lobby&game=sugar-rush&sessionID=' + encodeURIComponent(sessionID);
  }

  frame.src = url;
  layer.classList.add('open');
  document.body.style.overflow = 'hidden';
  fetchBalance();
}

function closeGame() {
  const layer = document.getElementById('game-layer');
  const frame = document.getElementById('game-frame');
  layer.classList.remove('open');
  frame.src = '';
  document.body.style.overflow = '';
}

document.getElementById('backBtn').addEventListener('click', closeGame);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeGame();
});

async function init() {
  sessionID = getOrCreateSessionID();
  document.getElementById('hdrPlayer').textContent = sessionID;
  renderGames();
  await fetchBalance();
  connectWS();
  document.getElementById('loading').classList.add('hide');
}

init();
</script>
</body>
</html>
