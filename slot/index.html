<!doctype html>
<html>
<head>
    <title>Sweet Bonanza</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: radial-gradient(circle at 50% 10%, #2b0d55, #0d0520 70%);
            font-family: Arial, sans-serif; color: #fff; touch-action: none;
        }
        #game-container {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
        }
        .game {
            width: min(100vw, 620px); height: min(100vh, 720px); padding: 10px;
            display: flex; flex-direction: column; gap: 10px; position: relative;
        }
        .fx { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 5; }
        .top { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: center; min-height: 56px; }
        .title { grid-column: 1 / -1; text-align: center; color: #ff8cff; font-weight: 900; letter-spacing: 1px; }
        .pill { background: rgba(20, 8, 44, .9); border: 1px solid #6f38d6; border-radius: 8px; padding: 8px 10px; font-weight: 700; font-size: 14px; }
        .grid {
            flex: 1; min-height: 380px; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(5, 1fr);
            gap: 6px; padding: 6px; background: rgba(6, 2, 20, .88); border: 3px solid #7d36d7; border-radius: 16px;
            box-shadow: 0 0 22px rgba(174, 69, 255, .35), inset 0 0 20px rgba(32, 8, 60, .8);
        }
        .cell {
            border-radius: 10px; background: #20103d; border: 1px solid rgba(255,255,255,.08);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .sym {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            border-radius: 10px; font-size: clamp(24px, 8.5vw, 48px); font-weight: 900;
            text-shadow: 0 2px 2px rgba(0,0,0,.35); border: 2px solid rgba(255,255,255,.18);
            transition: transform .18s ease, opacity .18s ease;
        }
        .spin .sym { animation: reel-drop .58s cubic-bezier(.18,.8,.28,1.05) both; }
        .rolling .sym { animation: roll-down .42s ease-in-out infinite; }
        .rolling.up .sym { animation-name: roll-up; }
        .sym.win { animation: pop .55s ease infinite alternate; box-shadow: 0 0 18px #ffd700; }
        @keyframes roll-down {
            0% { transform: translateY(-65%) scale(.96); opacity: .55; }
            45% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(65%) scale(.96); opacity: .55; }
        }
        @keyframes roll-up {
            0% { transform: translateY(65%) scale(.96); opacity: .55; }
            45% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-65%) scale(.96); opacity: .55; }
        }
        @keyframes reel-drop {
            0% { transform: translateY(-165%) scale(.92); opacity: 0; filter: blur(2px); }
            55% { opacity: 1; filter: blur(0); }
            78% { transform: translateY(8%) scale(1.03); }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes pop { from { transform: scale(1); } to { transform: scale(1.08); } }
        .particle {
            position: absolute; width: 8px; height: 8px; border-radius: 50%; background: #ffd700;
            animation: explode .62s ease-out forwards; box-shadow: 0 0 10px currentColor;
        }
        @keyframes explode {
            from { transform: translate(0,0) scale(1); opacity: 1; }
            to { transform: translate(var(--dx), var(--dy)) scale(.2); opacity: 0; }
        }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1.3fr; gap: 8px; align-items: center; min-height: 74px; }
        button {
            border: 0; border-radius: 10px; color: #fff; font-weight: 900; padding: 12px 10px;
            background: #45306d; box-shadow: inset 0 -3px rgba(0,0,0,.25); touch-action: manipulation;
        }
        #spin { background: linear-gradient(#ff6070, #ff314b); font-size: 22px; min-height: 58px; }
        button:disabled { opacity: .45; }
        #msg { grid-column: 1 / -1; text-align: center; min-height: 20px; color: #ffd86a; font-weight: 700; }
        @media (max-width: 430px) {
            .game { padding: 6px; gap: 7px; }
            .grid { gap: 4px; padding: 4px; min-height: 360px; }
            .pill { font-size: 12px; padding: 7px; }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <main class="game">
            <div class="fx" id="fx"></div>
            <section class="top">
                <div class="title">SWEET BONANZA MEGA BOMB</div>
                <div class="pill" id="balance">BALANCE: 10,000</div>
                <div class="pill" id="bet">BET: 100</div>
            </section>
            <section class="grid" id="grid" aria-label="slot grid"></section>
            <section class="controls">
                <button id="bet-down">-</button>
                <button id="bet-up">+</button>
                <button id="spin">SPIN</button>
                <div id="msg"></div>
            </section>
        </main>
    </div>
    <script src="game.js?v=20260722-fullspin"></script>
</body>
</html>
